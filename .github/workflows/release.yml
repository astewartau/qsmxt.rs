name: Release

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  coverage-gate:
    name: Coverage Gate (90%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout QSM.rs dependency
        uses: actions/checkout@v4
        with:
          repository: astewartau/QSM.rs
          path: ../QSM.rs

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Run coverage
        run: cargo tarpaulin --out json --output-dir target/tarpaulin -- --test-threads=1

      - name: Enforce 90% coverage
        run: |
          COVERAGE=$(python3 -c "import json; data=json.load(open('target/tarpaulin/tarpaulin-report.json')); print(f\"{data['coverage']:.2f}\")")
          echo "Coverage: ${COVERAGE}%"
          if python3 -c "import sys; sys.exit(0 if float('${COVERAGE}') >= 90.0 else 1)"; then
            echo "Coverage ${COVERAGE}% meets 90% threshold"
          else
            echo "::error::Coverage ${COVERAGE}% is below required 90% threshold"
            exit 1
          fi

  build:
    name: Build (${{ matrix.target }})
    needs: coverage-gate
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout QSM.rs dependency
        uses: actions/checkout@v4
        with:
          repository: astewartau/QSM.rs
          path: ../QSM.rs

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../qsmxt-${{ github.ref_name }}-${{ matrix.target }}.tar.gz qsmxt
          cd ../../..

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: qsmxt-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
